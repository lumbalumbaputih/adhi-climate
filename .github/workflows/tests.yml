name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the minimal stack
        run: pip install numpy pandas
      - name: stats_utils copies are byte-identical
        run: |
          for f in */stats_utils.py; do
            echo "diff rainfall-decline/stats_utils.py $f"
            diff rainfall-decline/stats_utils.py "$f"
          done
      - name: statistics and pipeline tests (every project)
        run: |
          for d in */; do
            if [ -f "${d}test_stats.py" ]; then
              echo "=== ${d}test_stats.py ==="
              (cd "$d" && python test_stats.py)
            fi
            if [ -f "${d}test_project.py" ]; then
              echo "=== ${d}test_project.py ==="
              (cd "$d" && python test_project.py)
            fi
          done
      - name: AASB S2 band-sensitivity check runs clean
        working-directory: aasb-s2-review
        run: python sensitivity.py
