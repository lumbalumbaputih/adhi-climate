<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Adhi Katili · Climate &amp; Sustainability</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="portfolio.css">
<link rel="icon" href="assets/logo-mark.svg">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/components.js"></script>
<script type="text/babel" src="js/sections.js" data-presets="react"></script>

<script type="text/babel" data-presets="react">
  const { PNav, PHero, PStatBand, PStories, PAbout, PFooter } = window;

  function App() {
    function scrollToContact() {
      const el = document.getElementById("contact");
      if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: "smooth" });
    }

    return (
      <div className="site">
        <PNav onContact={scrollToContact} />
        <PHero onContact={scrollToContact} />
        <PStatBand />
        <PStories />
        <PAbout />
        <PFooter />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
